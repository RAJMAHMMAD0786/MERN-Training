<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Attendance System</title>

    <link rel="stylesheet" href="style.css">


</head>

<script src="script.js"></script>

<body>
    <!-- first body -->
    <div class="SASbody">

        <!-- second body where i will write some contents and etc  -->
        <div class="SAScontainer">

            <!-- heading of the SAS  -->
            <div class="headingofSAS">
                <h1>Student Attendance System</h1>
            </div>

            <!-- This is the nav bar of the page  -->
            <div class="navbar">

                <!-- This is for input  -->
                <div class="inputspace">
                    <input type="text" name="" id="studentName" placeholder="Enter Student Name">
                </div>

                <!-- This is for Add Student button -->
                <div class="btnAddStudent">
                    <button id="addStudentBtn">Add Student</button>
                </div>

                <!-- This is for Save Attendance  -->
                <div class="btnSaveAttendance">
                    <button id="saveAttendanceBtn">Save Attendance</button>
                </div>

            </div>




            
            <!-- main part of the body Here i will build the table  -->
            <!-- This is the table  -->

            <div class="tableContainer">
                <table>

                    <!-- This is the table head  -->
                    <thead>
                        <tr>
                            <!-- This is the table heading, where i set the heading of the page -->
                            <th>ID</th>
                            <th>Studen Name</th>
                            <th>Status</th>
                            <th>Attendance</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <!-- This is the table body  -->
                    <tbody id="studentTableBody">

                        <!--  -->

                    </tbody>
                </table>
            </div>






            <!-- footer -->
            <div class="footer">
                <!-- total students -->
                <div class="totalstudents">
                    <span>Total Students: <span id="totalStudents">0</span></span>
                </div>

                <div class="presentstudent">
                    <span>Present: <span id="presentStudents">0</span></span>
                </div>

                <div class="absentstudent">
                    <span>Absent: <span id="absentStudents">0</span></span>
                </div>
            </div>

        </div>

    </div>
</body>

</html>

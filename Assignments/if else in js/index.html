<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // Original population of India
        let population = 1400;

        // Check population
        if (population > 33) {

            console.log(`India's population is ${population - 33} million above average`);

        } else {

            console.log(`India's population is ${33 - population} million below average`);

        }


        // Temporary change to 13
        population = 13;

        if (population > 33) {

            console.log(`India's population is ${population - 33} million above average`);

        } else {

            console.log(`India's population is ${33 - population} million below average`);

        }


        // Temporary change to 130
        population = 130;

        if (population > 33) {

            console.log(`India's population is ${population - 33} million above average`);

        } else {

            console.log(`India's population is ${33 - population} million below average`);

        }


        // Set back to original
        population = 1400;
        
    </script>
</body>

</html>

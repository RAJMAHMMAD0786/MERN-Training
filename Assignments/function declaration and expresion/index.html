<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        // Function Declaration

        function percentageOfWorld1(population) {

            return (population / 7900) * 100;

        }

        // Calling function for 3 countries

        let india = percentageOfWorld1(1400);

        let china = percentageOfWorld1(1441);

        let usa = percentageOfWorld1(331);

        console.log(india);
        console.log(china);
        console.log(usa);


        // Function Expression

        let percentageOfWorld2 = function (population) {

            return (population / 7900) * 100;

        };

        // Calling function expression for 3 countries

        let india2 = percentageOfWorld2(1400);

        let china2 = percentageOfWorld2(1441);

        let usa2 = percentageOfWorld2(331);

        console.log(india2);
        console.log(china2);
        console.log(usa2);

    </script>
</body>

</html>
